# Setup:
#   1. cp nginx.conf /etc/nginx/sites-available/comic
#   2. ln -s /etc/nginx/sites-available/comic /etc/nginx/sites-enabled/
#   3. Edit the root paths and server_name below.
#   4. Start the Deno backend:
#        ./scripts/start.sh
#   5. nginx -t && nginx -s reload
server {
    listen 80;
    server_name comics.local;

    location / {
        root /path/to/polina_site/static;
        try_files $uri $uri/ /index.html;
    }

    # Revisioned image URLs make this short fallback TTL safe.
    location ~ ^/(comics|arts|characters)/ {
        root /path/to/polina_site;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
