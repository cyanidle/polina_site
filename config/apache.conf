# Setup:
#   1. Enable the required modules:
#        sudo a2enmod proxy proxy_http headers expires alias
#   2. cp apache.conf /etc/apache2/sites-available/comic.conf
#   3. Edit the paths + ServerName below to point at this repo / your domain.
#   4. sudo a2ensite comic && sudo apachectl configtest && sudo systemctl reload apache2
#   5. Start the Deno backend:
#        ./scripts/start.sh

<VirtualHost *:80>
    ServerName comics.local

    DocumentRoot /path/to/polina_site/static
    <Directory /path/to/polina_site/static>
        Require all granted
        FallbackResource /index.html
    </Directory>

    AliasMatch "^/(comics|arts|characters)/(.*)$" "/path/to/polina_site/$1/$2"

    <DirectoryMatch "^/path/to/polina_site/(comics|arts|characters)(/|$)">
        Require all granted
        ExpiresActive On
        ExpiresDefault "access plus 5 minutes"
        Header set Cache-Control "public, max-age=300, must-revalidate"
    </DirectoryMatch>

    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/
</VirtualHost>
