# ── Production Apache config for the webcomic site ─────────────────
#
# Apache equivalent of nginx.conf — pick whichever you run; the frontend
# works identically behind Deno, nginx, or Apache (URLs stay the same, so
# no changes in app.js).
#
# Architecture:
#   Apache (public :80)     → serves static/, comics/, arts/ directly
#                           → proxies /api/ to Deno on 127.0.0.1:8080
#   server.ts (127.0.0.1)   → API only, never exposed to the outside
#
# Setup:
#   1. ENABLE THE REQUIRED MODULES FIRST — Apache will refuse to start with
#      "Invalid command 'Header'/'ProxyPreserveHost'/..." if any are missing:
#        sudo a2enmod proxy proxy_http headers expires alias
#      Verify all five are loaded before continuing:
#        apache2ctl -M | grep -E 'proxy_module|proxy_http|headers|expires|alias'
#   2. Make Apache listen on this vhost's port. A <VirtualHost *:9091> does
#      nothing unless Apache is bound to 9091 (by default it only listens on
#      80/443). Add the port to ports.conf, NOT here (a duplicate Listen
#      errors), so it coexists with any existing site on port 80:
#        echo "Listen 9091" | sudo tee -a /etc/apache2/ports.conf
#   3. cp apache.conf /etc/apache2/sites-available/comic.conf
#   4. Edit the paths + ServerName below to point at this repo / your domain.
#   5. sudo a2ensite comic && sudo apachectl configtest && sudo systemctl reload apache2
#   6. Start the Deno backend:
#        deno run --allow-net --allow-read --allow-env server.ts

<VirtualHost *:9091>
    ServerName comics.local                       # ← change to your domain

    # ── Frontend static files ──────────────────────────────────
    DocumentRoot /path/to/polina_site/static      # ← change me
    <Directory /path/to/polina_site/static>
        Require all granted
        # SPA fallback: serve index.html for client-side router paths
        # (equivalent to nginx `try_files $uri $uri/ /index.html`).
        FallbackResource /index.html
    </Directory>

    # ── Comic & art images (served directly, cached aggressively) ──
    # Aliases sit outside DocumentRoot, so the SPA fallback above does
    # NOT apply here — a missing image correctly 404s instead of
    # returning index.html.
    Alias /comics/ /data/polina/comics/
    Alias /arts/   /data/polina/arts/

    <Directory /data/polina/comics>
        Require all granted
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
        Header set Cache-Control "public, immutable, max-age=604800"
    </Directory>

    <Directory /data/polina/arts>
        Require all granted
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
        Header set Cache-Control "public, immutable, max-age=604800"
    </Directory>

    # ── API — proxy to Deno on localhost ───────────────────────
    # Deno is bound to 127.0.0.1 only, so it is *not* reachable from the
    # network — Apache is the sole entry point. Only /api/ is proxied, so
    # the static/image handlers above take everything else. mod_proxy_http
    # adds X-Forwarded-For automatically; ProxyPreserveHost forwards Host.
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/
</VirtualHost>
