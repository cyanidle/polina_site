<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardgrizz Comics</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Baumans:wght@500;700;900&display=swap" rel="stylesheet">
  <script>
    // Hide the language toggle before first paint when on a detail page
    // (comic detail/reader, art detail, character detail). It stays visible
    // on the landing page and all list/grid pages.
    (function() {
      var hash = (location.hash || "").replace(/^#\/?/, "");
      if (!hash) return; // landing — visible by default
      var segs = hash.split("/").map(decodeURIComponent);
      // detail pages: comics/<lang>/<name>, arts/<file>, characters/<name>
      if ((segs[0] === "comics" && segs.length >= 3) ||
          (segs[0] === "arts" && segs.length >= 2) ||
          (segs[0] === "characters" && segs.length >= 2)) {
        var el = document.getElementById("lang-toggle");
        if (el) el.style.display = "none";
      }
    })();
  </script>
</head>
<body>
  <button id="lang-toggle" class="lang-toggle" title="RU / EN">
    <span data-lang-btn="ru">RU</span><span class="lang-sep">/</span><span data-lang-btn="en">EN</span>
  </button>

  <main id="app"></main>

  <footer id="site-footer" class="site-disclaimer"></footer>

  <script src="app.js"></script>
</body>
</html>
