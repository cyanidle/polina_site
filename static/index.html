<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardgrizz Comics</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baumans&display=swap" rel="stylesheet">
  <script>
    (function() {
      var hash = (location.hash || "").replace(/^#\/?/, "");
      if (!hash) return;
      var segs = hash.split("/");
      if ((segs[0] === "comics" && segs.length >= 3) ||
          (segs[0] === "arts" && segs.length >= 2) ||
          (segs[0] === "characters" && segs.length >= 2)) {
        document.documentElement.classList.add("detail-route");
      }
    })();
  </script>
</head>
<body>
  <button id="lang-toggle" class="lang-toggle" title="RU / EN">
    <span data-lang-btn="ru">RU</span><span class="lang-sep">/</span><span data-lang-btn="en">EN</span>
  </button>

  <main id="app"></main>

  <footer id="site-footer" class="site-disclaimer"></footer>

  <script src="app.js"></script>
</body>
</html>
