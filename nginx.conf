# ── Production nginx config for the webcomic site ──────────────────
#
# Architecture:
#   nginx (public :80)      → serves static/, comics/ directly
#                           → proxies /api/ to Deno on 127.0.0.1:8080
#   server.ts (127.0.0.1)   → API only, never exposed to the outside
#
# Setup:
#   1. cp nginx.conf /etc/nginx/sites-available/comic
#   2. ln -s /etc/nginx/sites-available/comic /etc/nginx/sites-enabled/
#   3. Edit the `alias` paths below to point at this repo.
#   4. Start the Deno backend:
#        deno run --allow-net --allow-read server.ts
#   5. nginx -t && nginx -s reload
#
# The frontend works identically regardless of whether Deno or nginx is
# in front — URLs stay the same, so no config changes needed in app.js.

server {
    listen 80;
    server_name comics.local;          # ← change to your domain

    # ── Frontend static files ──────────────────────────────────
    location / {
        root /path/to/polina_site/static;
        try_files $uri $uri/ /index.html;
    }

    # ── Comic images (served directly, cached aggressively) ────
    location /comics/ {
        alias /path/to/polina_site/comics/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── API — proxy to Deno on localhost ───────────────────────
    # Deno is bound to 127.0.0.1 only, so it is *not* reachable
    # from the network — nginx is the sole entry point.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
